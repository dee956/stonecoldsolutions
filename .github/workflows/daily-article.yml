name: Daily Insights Article

# Generates a new business article each day and commits it.
# The push triggers DigitalOcean App Platform to redeploy automatically.

on:
  schedule:
    # 13:00 UTC every day. Adjust the time here if you like.
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-article
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk@^0.32.1 --no-audit --no-fund

      - name: Generate todays article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: node scripts/generate.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add insights/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add daily Insights article"
            git push
          fi
